body { font-family: Arial, sans-serif; height: 100vh; display: flex; flex-direction: column; background: #1a1a2e; }

  background: #16213e; color: #e0e0e0; padding: 10px 16px;

}
#topbar h1 { font-size: 15px; font-weight: bold; white-space: nowrap; color: #ffffff; }
.filter-group { display: flex; align-items: center; gap: 6px; }
.filter-group label { font-size: 12px; opacity: 0.75; white-space: nowrap; }
#topbar select {
  font-size: 12px; padding: 4px 8px; border: 1px solid rgba(255,255,255,0.2);
  border-radius: 4px; background: rgba(255,255,255,0.1); color: #e0e0e0; cursor: pointer; outline: none;
}
#topbar select option { color: #222; background: white; }
#topbar input[type=text] {
  font-size: 12px; padding: 4px 8px; border: 1px solid rgba(255,255,255,0.2);
  border-radius: 4px; background: rgba(255,255,255,0.1); color: #e0e0e0; width: 170px; outline: none;
}
#topbar input::placeholder { color: rgba(255,255,255,0.4); }
#match-count { font-size: 12px; opacity: 0.65; white-space: nowrap; }
#clear-btn {
  margin-left: auto; background: rgba(255,255,255,0.1);
  border: 1px solid rgba(255,255,255,0.25); color: #e0e0e0;
  padding: 4px 10px; border-radius: 4px; cursor: pointer; font-size: 12px; white-space: nowrap;
}
#clear-btn:hover { background: rgba(255,255,255,0.2); }
#toggle-boundaries {
  background: rgba(255,255,255,0.1); border: 1px solid rgba(255,255,255,0.25);
  color: #e0e0e0; padding: 4px 10px; border-radius: 4px; cursor: pointer; font-size: 12px;
}
#toggle-boundaries.active { background: rgba(100,200,150,0.3); border-color: rgba(100,200,150,0.6); }

#main { display: flex; flex: 1; overflow: hidden; }
#map  { flex: 1; z-index: 1; position: relative; }

#sidebar {
  width: 340px; min-width: 340px; background: #1a1a2e; color: #e0e0e0;
  overflow-y: auto; box-shadow: -3px 0 12px rgba(0,0,0,0.4);
  display: flex; flex-direction: column; z-index: 2;
}
#sidebar-placeholder {
  flex: 1; display: flex; flex-direction: column; align-items: center;

}
#sidebar-placeholder svg { margin-bottom: 14px; }
#sidebar-placeholder p { font-size: 13px; line-height: 1.6; }
#sidebar-content { display: none; flex-direction: column; flex: 1; }
#sidebar-header {
  padding: 14px 16px 12px; position: sticky; top: 0; z-index: 10; position: relative;
  background: #16213e;
}
#sidebar-header h2 { font-size: 16px; margin-bottom: 2px; color: #fff; }
#sidebar-header .sub { font-size: 12px; opacity: 0.65; }
#sidebar-close {
  position: absolute; top: 10px; right: 12px;
  background: rgba(255,255,255,0.1); border: none; color: #e0e0e0;
  width: 26px; height: 26px; border-radius: 50%; cursor: pointer;

}
#sidebar-close:hover { background: rgba(255,255,255,0.25); }
#sidebar-body { padding: 12px 14px; flex: 1; }
.parish-badge {

function makeIcon(color, selected, failed) {
  var size = selected ? 20 : 14;
  var sw   = selected ? 2.5 : 1.5;
  var inner = failed
    ? '<line x1="7" y1="5" x2="13" y2="11" stroke="white" stroke-width="2"/><line x1="13" y1="5" x2="7" y2="11" stroke="white" stroke-width="2"/>'

  var svg = '<svg xmlns="http://www.w3.org/2000/svg" width="'+(size*2)+'" height="'+(size*2.4)+'" viewBox="0 0 20 24">'
          + '<path d="M10 0C5.8 0 2 3.8 2 8c0 6 8 16 8 16s8-10 8-16c0-4.2-3.8-8-8-8z"'
          + ' fill="'+(failed?'#888':color)+'" stroke="white" stroke-width="'+sw+'"/>'
          + inner + '</svg>';

                     iconAnchor: [size, size*2.4], popupAnchor: [0, -(size*2)], className: '' });
}

// ─── GEOCODING (background, for addresses without pre-embedded coords) ────────
function loadCache() {
  try { return JSON.parse(localStorage.getItem(CACHE_KEY) || '{}'); }
  catch(e) { return {}; }
}
function saveCache(c) {
  try { localStorage.setItem(CACHE_KEY, JSON.stringify(c)); } catch(e) {}
}
function sleep(ms) { return new Promise(function(r) { setTimeout(r, ms); }); }

async function geocodeOne(rec, cache) {
  var key = rec.name + '||' + rec.address;
  if (cache[key]) return cache[key];

  var queries = [
    rec.address + ', ' + rec.parish + ', Matosinhos, Portugal',
    rec.address + ', Matosinhos, Portugal',
    rec.address + ', Portugal'
  ];

  for (var i = 0; i < queries.length; i++) {
    try {
      var url = NOMINATIM + '/search?format=json&limit=1&countrycodes=pt'
              + '&q=' + encodeURIComponent(queries[i]);
      var resp = await fetch(url, { headers: { 'User-Agent': 'MOVESIT-Matosinhos/1.0' } });
      if (!resp.ok) { await sleep(2000); continue; }
      var data = await resp.json();
      if (data && data.length > 0) {
        var res = { lat: parseFloat(data[0].lat), lon: parseFloat(data[0].lon),
                    display: data[0].display_name, status: i === 0 ? 'ok' : 'approx',
                    geoParish: null };
        try {
          var gurl = GEOAPI + '/gps/' + res.lat + ',' + res.lon + '/base?json=1';
          var gr   = await fetch(gurl);
          if (gr.ok) {
            var gd = await gr.json();
            if (gd && gd.freguesia) res.geoParish = gd.freguesia;
          }
        } catch(e2) {}
        cache[key] = res;
        saveCache(cache);
        return res;
      }
    } catch(e) {}
    await sleep(1100);
  }

  var fb  = PARISH_FALLBACK[rec.parish] || [41.195, -8.68];
  var res = { lat: fb[0], lon: fb[1], display: rec.parish + ' (centróide)', status: 'fallback', geoParish: rec.parish };
  cache[key] = res;
  saveCache(cache);
  return res;
}

async function geocodeBackground(toGeocode) {

    var geo = await geocodeOne(rec, cache);
    // Update or add marker (may already exist as fallback)
    var existing = null;
    for (var j = 0; j < markers.length; j++) {
      if (markers[j].rec === rec) { existing = markers[j]; break; }
    }
    if (existing) {
      existing.lat = geo.lat;
      existing.lon = geo.lon;
      existing.status = geo.status;
      existing.display = geo.display;
      existing.geoParish = geo.geoParish;
      existing.marker.setLatLng([geo.lat, geo.lon]);
      existing.marker.setIcon(makeIcon(PARISH_COLOR[rec.parish]||'#aaa', false, geo.status==='fallback'));
    } else {
      addMarker(rec, geo);
    }
    updateCounts();
    applyFilters();
    if (geo.status !== 'fallback') await sleep(1100);
  }

  badge.innerHTML = '&#10003; ' + n + ' moradas localizadas';
  setTimeout(function() { badge.style.display = 'none'; }, 4000);
}

// ─── MARKERS ─────────────────────────────────────────────────────────────────
function addMarker(rec, geo) {
  var color  = PARISH_COLOR[rec.parish] || '#aaa';
  var failed = (geo.status === 'fallback');
  var marker = L.marker([geo.lat, geo.lon], { icon: makeIcon(color, false, failed) })
    .addTo(map)
    .bindTooltip(rec.name, { permanent: false, direction: 'top' });

  var entry = { rec: rec, marker: marker, lat: geo.lat, lon: geo.lon,
                status: geo.status, display: geo.display,
                geoParish: geo.geoParish, visible: true };
  markers.push(entry);
  marker.on('click', function() { openSidebar(entry); });
}

// ─── SIDEBAR ─────────────────────────────────────────────────────────────────
function openSidebar(entry) {
  if (selectedMarker && selectedMarker !== entry) {
    var old = selectedMarker;
    old.marker.setIcon(makeIcon(PARISH_COLOR[old.rec.parish]||'#aaa', false, old.status==='fallback'));
  }
  selectedMarker = entry;
  entry.marker.setIcon(makeIcon(PARISH_COLOR[entry.rec.parish]||'#aaa', true, entry.status==='fallback'));

  document.getElementById('sidebar-placeholder').style.display = 'none';
  document.getElementById('sidebar-content').style.display     = 'flex';
  document.getElementById('sidebar-header').style.borderBottom = '3px solid '+(PARISH_COLOR[entry.rec.parish]||'#aaa');
  document.getElementById('s-name').textContent       = entry.rec.name;
  document.getElementById('s-parish-sub').textContent = entry.rec.parish;

  var badge = document.getElementById('s-badge');
  badge.textContent      = entry.rec.parish;
  badge.style.background = PARISH_COLOR[entry.rec.parish] || '#888';

  var mismatch = entry.geoParish && entry.geoParish !== entry.rec.parish;
  var g = '<dt>Morada</dt><dd>' + entry.rec.address + '</dd>'
        + '<dt>Freguesia</dt><dd>' + entry.rec.parish + '</dd>'
        + '<dt>Coordenadas</dt><dd>' + entry.lat.toFixed(5) + '° N, '
        + Math.abs(entry.lon).toFixed(5) + '° W</dd>'
        + (entry.geoParish ? '<dt>Validação</dt><dd>' + entry.geoParish
           + (mismatch ? ' ⚠️' : ' ✓') + '</dd>' : '');
  document.getElementById('s-info-grid').innerHTML = g;

  var statusEl = document.getElementById('s-geocode-status');
  if (entry.status === 'fallback') {
    statusEl.innerHTML = '<span class="geocode-fail">⚠ Centróide da freguesia (morada não encontrada)</span>';
  } else if (mismatch) {
    statusEl.innerHTML = '<span class="geocode-warn">⚠ Geocodificação: ponto cai em <b>'
      + entry.geoParish + '</b> (esperado: ' + entry.rec.parish + ')</span>';
  } else if (entry.status === 'approx') {
    statusEl.innerHTML = '<span class="geocode-approx">△ Posição aproximada</span>';
  } else {
    statusEl.innerHTML = '<span class="geocode-ok">✓ Geocodificação exacta</span>';
  }

  map.panTo([entry.lat, entry.lon], { animate: true });
}

function closeSidebar() {
  if (selectedMarker) {
    var old = selectedMarker;
    old.marker.setIcon(makeIcon(PARISH_COLOR[old.rec.parish]||'#aaa', false, old.status==='fallback'));
    selectedMarker = null;
  }
  document.getElementById('sidebar-content').style.display     = 'none';
  document.getElementById('sidebar-placeholder').style.display = 'flex';
}

// ─── FILTERS ─────────────────────────────────────────────────────────────────
function applyFilters() {
  var search = document.getElementById('search-input').value.trim().toLowerCase();
  var parish = document.getElementById('filter-parish').value || activeFilter || '';
  var visible = 0;

  markers.forEach(function(entry) {
    var ok = (!search || entry.rec.name.toLowerCase().indexOf(search) >= 0)
          && (!parish || entry.rec.parish === parish);
    if (ok) { if (!map.hasLayer(entry.marker)) entry.marker.addTo(map); visible++; }
    else    { if (map.hasLayer(entry.marker)) map.removeLayer(entry.marker); }
    entry.visible = ok;
  });

  document.getElementById('match-count').textContent =
    markers.length > 0 ? visible + ' / ' + ADDRESSES.length + ' residentes' : '';
  document.getElementById('no-results').style.display =
    (markers.length > 0 && visible === 0) ? 'block' : 'none';

  if (selectedMarker && !selectedMarker.visible) closeSidebar();

  Object.keys(LEGEND_IDS).forEach(function(p) {
    document.getElementById(LEGEND_IDS[p]).classList.toggle('dim', !!parish && parish !== p);
  });
}

function clearAll() {
  document.getElementById('search-input').value  = '';
  document.getElementById('filter-parish').value = '';
  activeFilter = null;
  applyFilters();
}

function toggleFilter(parish) {
  activeFilter = (activeFilter === parish) ? null : parish;
  document.getElementById('filter-parish').value = activeFilter || '';
  applyFilters();
}

document.getElementById('search-input').addEventListener('input',   applyFilters);
document.getElementById('filter-parish').addEventListener('change', function() {
  activeFilter = null; applyFilters();
});

function updateCounts() {
  var counts = {};
  Object.keys(CNT_IDS).forEach(function(p) { counts[p] = 0; });
  markers.forEach(function(e) { if (counts[e.rec.parish] !== undefined) counts[e.rec.parish]++; });
  Object.keys(CNT_IDS).forEach(function(p) {
    var el = document.getElementById(CNT_IDS[p]);
    if (el) el.textContent = counts[p] ? ' (' + counts[p] + ')' : '';
  });
}

// ─── PARISH BOUNDARIES via geoapi.pt ─────────────────────────────────────────
async function fetchBoundaries() {
  var btn = document.getElementById('toggle-boundaries');
  btn.textContent = '⏳ A carregar…';
  var total = SUBPARISHES.length;
  var done  = 0;

  for (var i = 0; i < total; i++) {
    var name  = SUBPARISHES[i];
    var group = SUBPARISH_GROUP[name];
    var color = PARISH_COLOR[group] || '#888';
    var url   = GEOAPI + '/municipio/matosinhos/freguesia/'
              + encodeURIComponent(name) + '?json=1';
    try {
      var resp = await fetch(url);
      if (!resp.ok) { done++; continue; }
      var data = await resp.json();
      if (!data.geojson) { done++; continue; }

      var layer = L.geoJSON(data.geojson, {
        style: {
          color: color, weight: 2, opacity: 0.85,
          fillColor: color, fillOpacity: 0.12
        }
      });
      layer.bindTooltip(
        '<b>' + data.nome + '</b><br><small style="opacity:.7">' + group + '</small>',
        { sticky: true }
      );
      layer.addTo(map);
      boundaryLayers.push(layer);
      done++;
      btn.textContent = '⏳ ' + done + '/' + total;
    } catch(e) { done++; }
    await sleep(300);
  }

  btn.textContent = '📍 Limites ✓';
  btn.classList.add('active');
}

function toggleBoundaries() {
  if (!boundariesOn) {
    boundariesOn = true;
    fetchBoundaries().catch(function() {
      document.getElementById('toggle-boundaries').textContent = '📍 Limites (erro)';
      boundariesOn = false;
    });
  } else {
    boundaryLayers.forEach(function(l) { if (map.hasLayer(l)) map.removeLayer(l); });
    boundaryLayers = [];
    boundariesOn   = false;
    var btn = document.getElementById('toggle-boundaries');
    btn.textContent = '📍 Limites';
    btn.classList.remove('active');
  }
}

// ─── INIT ────────────────────────────────────────────────────────────────────
function initMap() {
  var toGeocode = [];
  var cache = loadCache();

  ADDRESSES.forEach(function(rec) {
    if (rec.lat !== undefined && rec.lon !== undefined) {
      // Pre-geocoded from geoapi.pt national address database
      addMarker(rec, { lat: rec.lat, lon: rec.lon, status: rec.geoStatus || 'ok',
                       display: rec.address, geoParish: null });
    } else {
      // Check localStorage cache first
      var key = rec.name + '||' + rec.address;
      if (cache[key]) {
        addMarker(rec, cache[key]);
      } else {
        toGeocode.push(rec);
      }
    }
  });

  updateCounts();
  applyFilters();

  if (toGeocode.length > 0) {
    geocodeBackground(toGeocode);
  }
}

initMap();
</script>
